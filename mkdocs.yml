site_name: The Assembled Thought
site_url: https://mpodeley.github.io/assembled-thought/
site_description: >-
  A language model's factual thought splits into reusable parts — the thing and
  the question. We pull the parts out, put them back together, and the model
  speaks the answer. Plain-language, interactive, EN/ES.
site_author: Matias Podeley
repo_url: https://github.com/mpodeley/jspace-qwen
repo_name: code · jspace-qwen

theme:
  name: material
  custom_dir: overrides
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.superfences
  - tables

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: es
          name: Español
          build: true
          nav_translations:
            Home: Inicio
            Explained simply: Explicado fácil
            Play with it: Pruébalo
            Assemble a thought: Ensamblar un pensamiento
            The geometry: La geometría
            Evidence & controls: Evidencia y controles
            The paper: El paper
            What's next: Qué sigue
            Code & reproducibility: Código y reproducibilidad

nav:
  - Home: index.md
  - Explained simply: explained.md
  - Play with it:
      - Assemble a thought: assembly.md
      - The geometry: geometry.md
  - Evidence & controls: evidence.md
  - The paper: paper.md
  - What's next: future.md
  - Code & reproducibility: https://github.com/mpodeley/jspace-qwen
